name: DAST (OWASP ZAP) & Telegram Notifications

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch: {}
  schedule:
    # Escaneo nocturno adicional al de push, para no recargar cada commit
    - cron: '0 3 * * *'

jobs:
  dast:
    name: OWASP ZAP Baseline Scan & Notify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # frontend/.env.production.local está en .gitignore (no contiene secretos,
      # solo rutas públicas de Next.js) por lo que se regenera aquí para el build de CI.
      - name: Generar env de build del frontend
        run: |
          cat > frontend/.env.production.local <<'EOF'
          NEXT_PUBLIC_API_URL=/api/auth
          NEXT_PUBLIC_BOOKING_URL=/api/bookings
          NEXT_PUBLIC_USER_URL=/api/users
          EOF

      - name: Levantar aplicación con Docker Compose
        run: docker compose up -d --build

      - name: Esperar a que el frontend responda
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "Frontend disponible."
              exit 0
            fi
            echo "Esperando frontend... intento $i"
            sleep 5
          done
          echo "El frontend no respondió a tiempo."
          docker compose logs
          exit 1

      # No se usa fail_action para no romper el pipeline mientras se
      # afinan las reglas de .zap/rules.tsv y se controla el ruido de falsos positivos.
      - name: OWASP ZAP Baseline Scan
        id: zap_scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          fail_action: false
          allow_issue_writing: false

      - name: Setup Node.js
        if: always()
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Send Telegram Notification
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node tools/telegram-notifier-dast.js

      - name: Subir reporte ZAP como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
            report_md.md
          if-no-files-found: warn

      - name: Apagar contenedores
        if: always()
        run: docker compose down -v
